name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release, for example v0.2.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  hacs-release:
    name: Build and publish HACS release
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release metadata
        id: release
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${DISPATCH_TAG}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          prerelease=false
          case "${tag}" in
            *-alpha*|*-beta*|*-rc*)
              prerelease=true
              ;;
          esac

          {
            echo "tag=${tag}"
            echo "prerelease=${prerelease}"
          } >> "${GITHUB_OUTPUT}"

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Verify HACS package shape
        run: |
          scripts/build-hacs-release.sh
          unzip -t dist/lemonade.zip
          unzip -l dist/lemonade.zip | grep "custom_components/lemonade/manifest.json"
          unzip -l dist/lemonade.zip | grep "custom_components/lemonade/brand/icon.png"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: ${{ steps.release.outputs.tag }}
          prerelease: ${{ steps.release.outputs.prerelease }}
          generate_release_notes: true
